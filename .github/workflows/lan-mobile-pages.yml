name: Deploy LAN mobile client

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "lan-mobile/**"
      - "lan-transfer/mobile-template.html"
      - "lan-transfer/mobile-runtime.template.js"
      - "lan-transfer/peerjs.min.js"
      - "lan-transfer/secure-channel.js"
      - ".github/workflows/lan-mobile-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node lan-mobile/build.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: lan-mobile/dist
      - id: deployment
        uses: actions/deploy-pages@v4
