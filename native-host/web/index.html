<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <meta name="web-omni-lan-client" content="v2">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: blob:; media-src blob:; connect-src https: wss: ws:; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>Web-Omni 手机传输</title>
  <style>
    :root {
      --canvas:#0f1012;
      --raised:#17191d;
      --toolbar:#191d23;
      --hover:#202329;
      --active:#252a32;
      --input:#0f1216;
      --border:#30343c;
      --border-strong:#444a55;
      --text:#f2f4f7;
      --text-secondary:#b7bdc8;
      --text-muted:#858d9a;
      --blue:#4c8dff;
      --green:#35c56f;
      --amber:#f0ad3d;
      --red:#ef6262;
      --radius-sm:4px;
      --radius-md:6px;
      --radius-lg:8px;
      --ease:cubic-bezier(.32,0,.18,1);
      color-scheme:dark;
    }

    html[data-wo-theme="light"] {
      --canvas:#f4f6f8;
      --raised:#ffffff;
      --toolbar:#f8f9fb;
      --hover:#eef1f5;
      --active:#e5e9ef;
      --input:#ffffff;
      --border:#d9dee7;
      --border-strong:#b9c1ce;
      --text:#15171b;
      --text-secondary:#59616d;
      --text-muted:#7f8895;
      --blue:#2f7dd1;
      --green:#18864a;
      --amber:#a66c08;
      --red:#c83c3c;
      color-scheme:light;
    }

    * { box-sizing:border-box; letter-spacing:0 }
    html,body { width:100%; height:100%; margin:0; overflow:hidden }
    body {
      color:var(--text);
      background:var(--canvas);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      font-size:14px;
      line-height:1.5;
    }
    button,input,textarea { font:inherit }
    button { margin:0 }

    .app {
      display:grid;
      grid-template-rows:auto auto minmax(0,1fr);
      width:min(100%,720px);
      height:100vh;
      height:100dvh;
      min-height:480px;
      margin:0 auto;
      overflow:hidden;
      background:var(--raised);
      border-right:1px solid var(--border);
      border-left:1px solid var(--border);
    }

    .app-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      min-height:64px;
      padding:10px 12px;
      background:var(--raised);
      border-bottom:1px solid var(--border);
    }
    .brand { display:flex; align-items:center; min-width:0; gap:10px }
    .brand-mark {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:36px;
      height:36px;
      flex:0 0 36px;
      color:#fff;
      background:#2f7dd1;
      border:1px solid #5aa3ef;
      border-radius:var(--radius-md);
      font-size:12px;
      font-weight:800;
    }
    .brand-copy { min-width:0 }
    .eyebrow {
      margin:0 0 2px;
      overflow:hidden;
      color:var(--text-muted);
      font-size:11px;
      line-height:1.2;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    h1 {
      margin:0;
      overflow:hidden;
      color:var(--text);
      font-size:16px;
      font-weight:700;
      line-height:1.25;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .theme-switcher {
      display:inline-flex;
      align-items:center;
      gap:3px;
      padding:3px;
      flex:0 0 auto;
      background:var(--hover);
      border:1px solid var(--border);
      border-radius:var(--radius-md);
    }
    .theme-btn {
      min-height:30px;
      padding:5px 8px;
      color:var(--text-secondary);
      background:transparent;
      border:0;
      border-radius:var(--radius-sm);
      cursor:pointer;
      font-size:11px;
      font-weight:650;
      transition:color 180ms var(--ease),background 180ms var(--ease);
    }
    .theme-btn.active { color:var(--text); background:var(--active) }

    .connection-drawer {
      display:grid;
      grid-template-rows:auto auto;
      min-width:0;
      background:var(--toolbar);
      border-bottom:1px solid var(--border);
    }
    .status {
      display:grid;
      grid-template-columns:auto minmax(0,1fr) auto;
      align-items:center;
      gap:10px;
      width:100%;
      min-height:44px;
      padding:7px 12px;
      color:var(--text);
      background:transparent;
      border:0;
      cursor:pointer;
      text-align:left;
    }
    .status:hover { background:var(--hover) }
    .dot {
      width:9px;
      height:9px;
      flex:0 0 9px;
      background:var(--text-muted);
      border-radius:50%;
    }
    .status.connecting .dot { background:var(--amber); animation:pulse 1.2s infinite }
    .status.connected .dot { background:var(--green); animation:none }
    .status-copy { display:grid; min-width:0 }
    .status-copy strong {
      overflow:hidden;
      font-size:12px;
      line-height:1.35;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .status-copy small { color:var(--text-muted); font-size:10px; line-height:1.3 }
    .drawer-chevron {
      width:8px;
      height:8px;
      margin-right:3px;
      border-right:1.5px solid var(--text-muted);
      border-bottom:1.5px solid var(--text-muted);
      transform:rotate(225deg);
      transition:transform 420ms var(--ease);
    }
    .connection-drawer.collapsed .drawer-chevron { transform:rotate(45deg) }
    .pairing-reveal {
      display:grid;
      grid-template-rows:1fr;
      min-height:0;
      opacity:1;
      transition:grid-template-rows 420ms var(--ease),opacity 260ms var(--ease);
    }
    .connection-drawer.collapsed .pairing-reveal { grid-template-rows:0fr; opacity:0 }
    .pairing-reveal-inner { min-height:0; overflow:hidden }
    .pairing-panel { padding:2px 12px 12px }
    .field-label {
      display:block;
      margin-bottom:6px;
      color:var(--text-muted);
      font-size:11px;
      font-weight:650;
    }
    .code-row { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:8px }
    .code-input {
      width:100%;
      min-width:0;
      height:42px;
      padding:8px 12px;
      color:var(--text);
      background:var(--input);
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      outline:0;
      font-family:"SFMono-Regular",Consolas,monospace;
      font-size:18px;
      font-variant-numeric:tabular-nums;
      text-align:center;
      text-transform:uppercase;
    }
    .code-input:focus-visible { border-color:var(--blue); box-shadow:0 0 0 3px rgba(76,141,255,.12) }

    .btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:36px;
      padding:7px 12px;
      color:var(--text);
      background:var(--hover);
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      cursor:pointer;
      font-size:12px;
      font-weight:650;
      transition:color 180ms var(--ease),background 180ms var(--ease),border-color 180ms var(--ease);
    }
    .btn:hover { background:var(--active); border-color:var(--border-strong) }
    .btn:disabled { opacity:.5; cursor:default }
    .btn-primary { color:#fff; background:#2f7dd1; border-color:#5aa3ef }
    .btn-primary:hover { background:#377fcb; border-color:#76b5f4 }

    .conversation-panel {
      display:grid;
      grid-template-rows:auto minmax(0,1fr) auto;
      min-height:0;
      overflow:hidden;
      background:var(--raised);
    }
    .conversation-toolbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      min-height:48px;
      padding:7px 12px;
      background:var(--toolbar);
      border-bottom:1px solid var(--border);
    }
    .conversation-heading { display:grid; min-width:0 }
    .conversation-heading strong { color:var(--text); font-size:13px; line-height:1.3 }
    .conversation-heading span { color:var(--text-muted); font-size:10px; line-height:1.3 }
    .secure-badge {
      padding:4px 7px;
      color:var(--green);
      background:rgba(53,197,111,.08);
      border:1px solid rgba(53,197,111,.22);
      border-radius:var(--radius-sm);
      font-size:10px;
      font-weight:700;
      white-space:nowrap;
    }

    .conversation-surface { min-height:0; overflow:hidden; background:var(--canvas) }
    .conversation-surface.drag-over { box-shadow:inset 0 0 0 2px var(--blue) }
    .conversation-stream {
      display:flex;
      flex-direction:column;
      gap:12px;
      width:100%;
      height:100%;
      min-width:0;
      padding:14px 12px;
      overflow-x:hidden;
      overflow-y:auto;
      overscroll-behavior:contain;
      scrollbar-color:var(--border-strong) transparent;
      scrollbar-width:thin;
    }
    .conversation-empty {
      display:flex;
      flex:1 0 auto;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:100%;
      padding:24px;
      text-align:center;
    }
    .conversation-empty-mark {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:40px;
      height:40px;
      color:var(--blue);
      background:var(--raised);
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      font-size:11px;
      font-weight:800;
    }
    .conversation-empty-title { margin:0; color:var(--text); font-size:15px; font-weight:700 }
    .conversation-empty-copy { margin:0; color:var(--text-secondary); font-size:12px; line-height:1.55 }

    .conversation-item {
      display:flex;
      align-items:flex-end;
      width:100%;
      min-width:0;
      animation:message-enter 280ms var(--ease);
    }
    .conversation-item.outgoing { justify-content:flex-end }
    .conversation-item.system-note { justify-content:center }
    .text-bubble,.file-bubble,.system-bubble {
      color:var(--text);
      background:var(--raised);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      box-shadow:none;
    }
    .conversation-item.outgoing .text-bubble,
    .conversation-item.outgoing .file-bubble { color:#edf5ff; background:#243247; border-color:#36557c }
    .text-bubble { max-width:min(84%,440px); padding:10px 11px 8px }
    .text-body {
      margin:0;
      overflow-wrap:anywhere;
      color:inherit;
      font-size:14px;
      line-height:1.55;
      white-space:pre-wrap;
    }
    .text-body a { color:#86bdff; overflow-wrap:anywhere; text-decoration:underline; text-underline-offset:3px }
    .message-meta {
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:5px 10px;
      margin-top:7px;
      color:var(--text-muted);
      font-size:10px;
    }
    .conversation-item.outgoing .message-meta { color:#a9bad0 }
    .message-meta-actions { display:inline-flex; align-items:center; gap:7px }
    .chat-copy { padding:0; color:var(--blue); background:transparent; border:0; cursor:pointer; font-size:10px; font-weight:650 }
    .text-status,.file-status { color:var(--text-muted) }
    .text-status.done,.file-status.done { color:var(--green) }
    .text-status.error,.file-status.error { color:var(--red) }

    .conversation-item.file-message { width:100% }
    .file-bubble {
      display:grid;
      grid-template-columns:auto minmax(0,1fr);
      gap:9px;
      width:min(88%,440px);
      padding:10px;
    }
    .file-bubble .file-icon {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:38px;
      height:38px;
      color:var(--blue);
      background:var(--hover);
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      font-size:11px;
      font-weight:750;
    }
    .conversation-item.outgoing .file-icon { color:#dcecff; background:#2c3d55; border-color:#42658f }
    .file-info { min-width:0 }
    .file-name { overflow-wrap:anywhere; color:inherit; font-size:12px; font-weight:650; line-height:1.4 }
    .file-meta { margin-top:3px; color:var(--text-secondary); font-size:10px }
    .conversation-item.outgoing .file-meta { color:#a9bad0 }
    .file-speed { color:#86bdff }
    .file-progress { height:4px; margin-top:8px; overflow:hidden; background:var(--hover); border-radius:2px }
    .conversation-item.outgoing .file-progress { background:#182334 }
    .file-progress-bar { width:0; height:100%; background:var(--blue); border-radius:inherit; transition:width 220ms var(--ease) }
    .file-status { grid-column:2; font-size:10px; line-height:1.4 }
    .system-bubble { max-width:88%; padding:6px 9px; color:var(--text-secondary); background:var(--hover); font-size:10px; text-align:center }

    .composer-shell {
      padding:10px 10px calc(10px + env(safe-area-inset-bottom));
      background:var(--toolbar);
      border-top:1px solid var(--border);
    }
    .chat-composer {
      padding:7px 8px;
      background:var(--input);
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      transition:border-color 180ms var(--ease),box-shadow 180ms var(--ease);
    }
    .chat-composer:focus-within { border-color:var(--blue); box-shadow:0 0 0 3px rgba(76,141,255,.12) }
    .chat-input {
      display:block;
      width:100%;
      min-width:0;
      min-height:34px;
      max-height:112px;
      padding:4px 6px;
      overflow-y:hidden;
      resize:none;
      color:var(--text);
      background:transparent;
      border:0;
      outline:0;
      font-size:14px;
      line-height:1.5;
    }
    .chat-input::placeholder { color:var(--text-muted); opacity:1 }
    .composer-bottom { display:flex; align-items:center; justify-content:space-between; gap:8px; min-height:34px; margin-top:4px }
    .composer-left,.composer-right { display:flex; align-items:center; min-width:0; gap:7px }
    .composer-left { flex:1 1 auto }
    .composer-right { flex:0 0 auto }
    .composer-plus,.send-chat-btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:34px;
      height:34px;
      min-width:34px;
      min-height:34px;
      flex:0 0 34px;
      padding:0;
      border-radius:var(--radius-md);
    }
    .composer-plus { color:var(--text-secondary); background:var(--hover); border:1px solid var(--border); cursor:pointer; font-size:21px; line-height:1 }
    .composer-plus:disabled { opacity:.45; cursor:default }
    .chat-hint { overflow:hidden; color:var(--text-muted); font-size:10px; line-height:1.3; text-overflow:ellipsis; white-space:nowrap }
    .chat-counter {
      padding:4px 6px;
      color:var(--text-muted);
      background:var(--hover);
      border:1px solid var(--border);
      border-radius:var(--radius-sm);
      font-size:9px;
      font-variant-numeric:tabular-nums;
      line-height:1.2;
      white-space:nowrap;
    }
    .chat-counter.over-limit { color:var(--red); border-color:rgba(239,98,98,.45) }
    .send-chat-btn { font-size:18px; line-height:1 }

    button:focus { outline:0 }
    button:focus-visible,.theme-btn:focus-visible,.composer-plus:focus-visible {
      outline:2px solid var(--blue);
      outline-offset:2px;
    }

    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.35 } }
    @keyframes message-enter {
      from { opacity:0; transform:translateY(4px); filter:blur(.6px) }
      to { opacity:1; transform:translateY(0); filter:blur(0) }
    }

    @media (max-width:420px) {
      .app { border:0 }
      .app-header { min-height:58px; padding:8px 9px }
      .brand { gap:8px }
      .brand-mark { width:34px; height:34px; flex-basis:34px }
      .theme-btn { min-height:28px; padding:4px 6px; font-size:10px }
      .status { padding-right:10px; padding-left:10px }
      .pairing-panel { padding-right:10px; padding-left:10px }
      .conversation-toolbar { min-height:44px; padding:6px 10px }
      .conversation-stream { padding-right:9px; padding-left:9px }
      .text-bubble { max-width:88% }
      .file-bubble { width:92% }
      .file-status { grid-column:1 / -1 }
      .composer-shell { padding-right:8px; padding-left:8px }
      .chat-hint { max-width:92px }
    }

    @media (max-width:340px) {
      .eyebrow { display:none }
      .theme-btn { padding-right:5px; padding-left:5px }
      .secure-badge,.chat-hint { display:none }
      .chat-counter { font-size:8px }
    }

    @media (prefers-reduced-motion:reduce) {
      *,*::before,*::after {
        scroll-behavior:auto !important;
        animation-duration:.01ms !important;
        animation-iteration-count:1 !important;
        transition-duration:.01ms !important;
      }
    }
  </style>
</head>
<body data-connection-state="connecting">
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">WO</div>
        <div class="brand-copy">
          <p class="eyebrow">Web-Omni</p>
          <h1>手机传输</h1>
        </div>
      </div>

      <div class="theme-switcher" role="group" aria-label="主题模式">
        <button type="button" class="theme-btn" data-theme-mode="auto" aria-pressed="true">自动</button>
        <button type="button" class="theme-btn" data-theme-mode="dark" aria-pressed="false">深色</button>
        <button type="button" class="theme-btn" data-theme-mode="light" aria-pressed="false">浅色</button>
      </div>
    </header>

    <section class="connection-drawer" id="connectionDrawer">
      <button class="status connecting" id="statusBar" type="button" aria-expanded="true" aria-controls="pairingReveal">
        <span class="dot" aria-hidden="true"></span>
        <span class="status-copy">
          <strong id="statusText">等待连接电脑</strong>
          <small>端到端加密会话</small>
        </span>
        <span class="drawer-chevron" aria-hidden="true"></span>
      </button>
      <div class="pairing-reveal" id="pairingReveal">
        <div class="pairing-reveal-inner">
          <div class="pairing-panel">
            <label class="field-label" for="roomCodeInput">电脑端房间码</label>
            <div class="code-row">
              <input id="roomCodeInput" class="code-input" maxlength="6" placeholder="------" autocomplete="off" inputmode="text">
              <button class="btn btn-primary" id="connectBtn" type="button">连接</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="conversation-panel">
      <div class="conversation-toolbar">
        <div class="conversation-heading">
          <strong>传输会话</strong>
          <span>手机与电脑</span>
        </div>
        <span class="secure-badge">v2 加密</span>
      </div>

      <div class="conversation-surface" id="conversationSurface">
        <div class="conversation-stream" id="conversationStream">
          <div class="conversation-empty" id="conversationEmpty">
            <div class="conversation-empty-mark">WO</div>
            <p class="conversation-empty-title">会话已准备</p>
            <p class="conversation-empty-copy">连接状态与消息会显示在这里</p>
          </div>
        </div>
      </div>

      <div class="composer-shell">
        <input id="fileInput" type="file" multiple hidden>
        <div class="chat-composer">
          <textarea id="chatInput" class="chat-input" rows="1" placeholder="输入消息" spellcheck="false"></textarea>
          <div class="composer-bottom">
            <div class="composer-left">
              <button class="composer-plus" id="pickFileBtn" type="button" disabled aria-label="发送文件" title="发送文件">+</button>
              <span class="chat-hint" id="chatHint">等待安全连接</span>
            </div>
            <div class="composer-right">
              <div class="chat-counter" id="chatCounter">0 / 32768</div>
              <button class="btn btn-primary send-chat-btn" id="sendChatBtn" type="button" disabled aria-label="发送消息" title="发送消息">↑</button>
            </div>
          </div>
        </div>
      </div>
    </section>

﻿(function() {
  "use strict";

  const CHUNK_SIZE = 64 * 1024;

    ? navigator.deviceMemory

  const BUFFER_HIGH_WATER_MARK = (DEVICE_MEMORY_GB <= 2 ? 12 : DEVICE_MEMORY_GB <= 4 ? 20 : 28) * CHUNK_SIZE;
  const PROGRESS_UPDATE_INTERVAL_MS = 120;

  const TEXT_ACK_TIMEOUT_MS = 15000;
  const CONNECTION_TIMEOUT_MS = 12000;

  const RECONNECT_MAX_DELAY_MS = 4000;

  const DATA_CHANNEL_STALL_TIMEOUT_MS = 15000;
  const MAX_SEND_ATTEMPTS = 3;

  const RECEIVE_DB_NAME = "wo-lan-transfer-vnext-mobile";
  const RECEIVE_STORE_NAME = "chunks";
  const EXPORTED_RUNTIME_CONFIG = {"signalServers":[{"host":"0.peerjs.com","port":443,"secure":true,"path":"/"}],"iceServers":[{"urls":"stun:stun.l.google.com:19302"},{"urls":"stun:stun1.l.google.com:19302"},{"urls":"stun:stun.cloudflare.com:3478"}],"hashAlgorithm":"sha256","allowLegacyProtocol":false};
  const EXPORTED_SECURE_SESSION = null;
  const LAUNCH_CONFIG = readLaunchConfig();
  const ACTIVE_RUNTIME_CONFIG = LAUNCH_CONFIG.runtimeConfig || EXPORTED_RUNTIME_CONFIG;
  const SIGNAL_SERVERS = Array.isArray(ACTIVE_RUNTIME_CONFIG.signalServers) && ACTIVE_RUNTIME_CONFIG.signalServers.length
    ? ACTIVE_RUNTIME_CONFIG.signalServers

  const ICE_SERVERS = ACTIVE_RUNTIME_CONFIG.iceServers || [];
  const PREFILLED_ROOM_CODE = LAUNCH_CONFIG.roomCode || "";
  const SECURE_SESSION = LAUNCH_CONFIG.secureSession || EXPORTED_SECURE_SESSION;
  const LOCAL_RELAY_URL = LAUNCH_CONFIG.relayUrl || "";
  const ALLOW_LEGACY_PROTOCOL = Boolean(ACTIVE_RUNTIME_CONFIG.allowLegacyProtocol);
  const THEME_STORAGE_KEY = "woLanTransferThemeMode";

  const $ = function(id) { return document.getElementById(id); };
  const encoder = new TextEncoder();
  const outgoingTransfers = new Map();
  const incomingTransfers = new Map();
  const completedIncomingTransfers = new Map();
  const pendingTextMessages = new Map();
  const receivedTextMessages = new Set();
  const sendQueue = [];
  let sendQueueRunning = false;

  const activeChunkWriteQueues = new Set();
  const activeObjectUrls = new Set();

  const ACK_MAX_DELAY = 100;

  init();

  function readLaunchConfig() {
    try {
      const params = new URLSearchParams(location.hash.replace(/^#/, ""));
      if (params.get("v") !== "2") return {};
      const sessionId = params.get("s") || params.get("session") || "";
      const pairingSecret = params.get("k") || params.get("key") || "";
      let runtimeConfig = null;
      const encodedConfig = params.get("config");
      if (encodedConfig) {
        const normalized = encodedConfig.replace(/-/g, "+").replace(/_/g, "/");
        const padded = normalized + "=".repeat((4 - normalized.length % 4) % 4);
        runtimeConfig = JSON.parse(atob(padded));
      }
      return {
        roomCode: String(params.get("room") || "").toUpperCase(),
        relayUrl: params.get("relay") || "",
        runtimeConfig,
        secureSession: sessionId && pairingSecret ? {
          sessionId,
          pairingSecret,
          targetPeerId: params.get("peer") || "",
        } : null,
      };
    } catch (_) {
      return {};
    }
  }

  function init() {
    $("roomCodeInput").value = PREFILLED_ROOM_CODE;
    initThemeMode();
    Array.prototype.forEach.call(document.querySelectorAll(".theme-btn[data-theme-mode]"), function(button) {
      button.addEventListener("click", function() {
        setThemeMode(String(button.dataset.themeMode || "auto"));
      });
    });
    $("statusBar").addEventListener("click", function() {
      const drawer = $("connectionDrawer");
      setConnectionDrawerCollapsed(!drawer.classList.contains("collapsed"));
    });
    $("connectBtn").addEventListener("click", function() { connectToDesktop(0); });
    $("pickFileBtn").addEventListener("click", function() { $("fileInput").click(); });
    $("fileInput").addEventListener("change", function(event) {
      queueFiles(event.target.files);
      event.target.value = "";
    });
    $("chatInput").addEventListener("input", updateChatComposerState);
    $("chatInput").addEventListener("paste", handleComposerPaste);
    $("chatInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendTextMessage().catch(function(error) {
          console.error("[WO Mobile] Send text failed:", error);
        });
      }
    });
    $("sendChatBtn").addEventListener("click", function() {
      sendTextMessage().catch(function(error) {
        console.error("[WO Mobile] Send text failed:", error);
      });
    });
    ["dragenter", "dragover"].forEach(function(eventName) {
      $("conversationSurface").addEventListener(eventName, function(event) {
        event.preventDefault();
        event.stopPropagation();
        $("conversationSurface").classList.add("drag-over");
      });
    });
    ["dragleave", "drop"].forEach(function(eventName) {
      $("conversationSurface").addEventListener(eventName, function(event) {
        event.preventDefault();
        event.stopPropagation();
        $("conversationSurface").classList.remove("drag-over");
      });
    });
    $("conversationSurface").addEventListener("drop", function(event) {
      queueFiles(event.dataTransfer.files);
    });
    window.addEventListener("pagehide", cleanupRuntime, { once: true });
    window.addEventListener("beforeunload", cleanupRuntime, { once: true });
    updateChatComposerState();
    if (SECURE_SESSION && SECURE_SESSION.sessionId && SECURE_SESSION.pairingSecret) {
      setTimeout(function() { connectToDesktop(0, SECURE_SESSION.targetPeerId); }, 0);
    }
  }

  function handleComposerPaste(event) {
    var files = extractClipboardFiles(event.clipboardData);
    if (!files.length) {
      return;
    }

    event.preventDefault();
    queueFiles(files);
  }

  function extractClipboardFiles(clipboardData) {

    var results = [];
    var seenKeys = new Set();

    function pushFile(file) {
      if (!file) return;
      var normalized = normalizeClipboardFile(file, results.length);
      var key = [
        normalized.name,
        normalized.size,
        normalized.type,
        normalized.lastModified || 0
      ].join("::");
      if (seenKeys.has(key)) return;
      seenKeys.add(key);
      results.push(normalized);
    }

    if (clipboardData.files && clipboardData.files.length) {
      Array.prototype.forEach.call(clipboardData.files, function(file) {
        pushFile(file);
      });
    }

    if (clipboardData.items && clipboardData.items.length) {
      Array.prototype.forEach.call(clipboardData.items, function(item) {
        if (item.kind !== "file") return;
        pushFile(item.getAsFile());
      });
    }

    return results;
  }

    if (file.name) return file;

        Object.defineProperty(file, "lastModified", { value: Date.now(), configurable: true });

      return file;
    }

  function guessExtensionFromMime(type) {
    var mime = String(type || "").toLowerCase();
    if (!mime) return ".bin";
    if (mime === "image/jpeg") return ".jpg";
    if (mime === "image/png") return ".png";
    if (mime === "image/gif") return ".gif";
    if (mime === "image/webp") return ".webp";
    if (mime === "image/bmp") return ".bmp";
    if (mime === "image/svg+xml") return ".svg";
    if (mime === "text/plain") return ".txt";
    if (mime === "text/html") return ".html";
    if (mime === "application/pdf") return ".pdf";
    var slashIndex = mime.indexOf("/");
    if (slashIndex === -1 || slashIndex === mime.length - 1) return ".bin";

    var now = new Date();
    return [
      now.getFullYear(),
      String(now.getMonth() + 1).padStart(2, "0"),
      String(now.getDate()).padStart(2, "0"),
      "-",
      String(now.getHours()).padStart(2, "0"),
      String(now.getMinutes()).padStart(2, "0"),
      String(now.getSeconds()).padStart(2, "0")

      media.addListener(handleChange);

    } catch (error) {
      return "auto";
    }

  function setThemeMode(mode) {
